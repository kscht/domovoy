server {
    server_tokens off;
    listen 8080;
    root /usr/share/nginx/html;

    gzip            on;
    gzip_static     on;
    gunzip          on;
    gzip_vary       on;
    gzip_comp_level 5;
    gzip_types application/javascript application/json text/css text/plain image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        alias /usr/share/nginx/html/assets/;
    }
}
